name: RP

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: rp-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
    steps:
      - name: Token mode note
        if: ${{ env.RELEASE_PLEASE_TOKEN == '' }}
        run: |
          echo "::warning::RELEASE_PLEASE_TOKEN is not set; falling back to GITHUB_TOKEN."
          echo "::warning::Release Please PR/tag events will not trigger downstream workflows in fallback mode."

      - name: Release Please
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        with:
          release-type: simple
          token: ${{ env.RELEASE_PLEASE_TOKEN || github.token }}
