name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run lint
        run: uv run ruff check .

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run unit tests (excluding integration)
        run: |
          mkdir -p coverage
          uv run pytest tests --ignore=tests/integration --junitxml=coverage/junit-unit.xml

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: junit-unit
          path: coverage/junit-unit.xml
          if-no-files-found: warn

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run integration tests
        run: |
          mkdir -p coverage
          uv run pytest tests/integration --junitxml=coverage/junit-integration.xml

      - name: Upload integration test report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: junit-integration
          path: coverage/junit-integration.xml
          if-no-files-found: warn

  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs:
      - lint
      - unit-tests
      - integration-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Generate coverage + test reports for Sonar
        run: |
          mkdir -p coverage
          COVERAGE_FILE=coverage/.coverage uv run pytest \
            --cov-config=.coveragerc \
            --cov=src \
            --cov-report=xml:coverage/coverage.xml \
            --junitxml=coverage/junit.xml

      - name: Upload coverage and Sonar test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-and-sonar-reports
          path: |
            coverage/coverage.xml
            coverage/junit.xml
          if-no-files-found: error

      - name: SonarQube Scan
        if: ${{ secrets.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Quality Gate
        if: ${{ secrets.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Skip SonarQube (missing SONAR_TOKEN)
        if: ${{ secrets.SONAR_TOKEN == '' }}
        run: echo "SONAR_TOKEN is not configured, skipping SonarQube scan."
