name: CI

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Unit, Integration, Sonar
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    env:
      COVERAGE_FILE: coverage/.coverage
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require SONAR_TOKEN
        timeout-minutes: 1
        run: |
          if [ -z "${SONAR_TOKEN}" ]; then
            echo "::error::SONAR_TOKEN secret is required for CI."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        timeout-minutes: 4
        run: uv sync --all-extras

      - name: Validate GitHub workflows
        timeout-minutes: 1
        run: uv run actionlint -color

      - name: Run lint
        timeout-minutes: 2
        run: uv run ruff check .

      - name: Run unit tests (excluding integration)
        timeout-minutes: 3
        run: |
          mkdir -p coverage
          COVERAGE_FILE="$COVERAGE_FILE" uv run pytest tests \
            --ignore=tests/integration \
            --maxfail=1 \
            --cov-config=.coveragerc \
            --cov=src \
            --cov-report= \
            --junitxml=coverage/junit-unit.xml

      - name: Run integration tests
        timeout-minutes: 2
        run: |
          COVERAGE_FILE="$COVERAGE_FILE" uv run pytest tests/integration \
            --maxfail=1 \
            --cov-config=.coveragerc \
            --cov=src \
            --cov-append \
            --cov-report= \
            --junitxml=coverage/junit-integration.xml

      - name: Generate combined coverage + Sonar report paths
        timeout-minutes: 1
        run: |
          COVERAGE_FILE="$COVERAGE_FILE" uv run coverage xml -o coverage/coverage.xml
          COVERAGE_FILE="$COVERAGE_FILE" uv run coverage report -m
          cp coverage/junit-unit.xml coverage/junit.xml

      - name: Upload coverage and Sonar test reports
        if: ${{ success() }}
        timeout-minutes: 1
        uses: actions/upload-artifact@v7
        with:
          name: coverage-and-sonar-reports
          path: |
            coverage/coverage.xml
            coverage/junit.xml
            coverage/junit-unit.xml
            coverage/junit-integration.xml
          if-no-files-found: error

      - name: SonarQube Scan
        timeout-minutes: 2
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

      - name: SonarQube Quality Gate
        timeout-minutes: 2
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
