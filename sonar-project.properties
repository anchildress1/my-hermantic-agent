# SonarCloud project identity
sonar.organization=anchildress1
sonar.projectKey=anchildress1_my-hermantic-agent
sonar.projectName=my-hermantic-agent
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8

# Source and test layout
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py
sonar.exclusions=**/__pycache__/**,**/*.pyc,coverage/**,logs/**,data/**

# Python analyzer settings
sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage/coverage.xml
sonar.python.xunit.reportPath=coverage/junit.xml

# Keep exclusions tight: init modules and CLI entrypoints only.
sonar.coverage.exclusions=**/__init__.py,main.py,src/main.py
